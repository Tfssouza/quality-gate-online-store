name: quality-gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  quality-gate:
    name: quality-gate (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium, firefox, webkit ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start API (background) + log
        run: |
          nohup node apps/api/server.js > api.log 2>&1 &
          echo $! > api.pid
          sleep 1
          tail -n 30 api.log || true

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health > /dev/null; then
              echo "API is healthy ✅"
              exit 0
            fi
            echo "Waiting API... ($i/30)"
            sleep 1
          done
          echo "API did not become healthy ❌"
          echo "---- api.log (last 200 lines) ----"
          tail -n 200 api.log || true
          exit 1

      - name: Run tests (API/E2E) - ${{ matrix.browser }}
        env:
          BROWSER: ${{ matrix.browser }}
        run: |
          npx playwright test --project=${{ matrix.browser }} --reporter=html,line

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report
          if-no-files-found: warn

      - name: Upload API log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-log-${{ matrix.browser }}
          path: api.log
          if-no-files-found: warn

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then kill $(cat api.pid) || true; fi